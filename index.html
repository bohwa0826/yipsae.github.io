<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>잎새교육 - 아이들의 푸른 미래를 키웁니다</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2ea75f; /* 잎새 느낌의 녹색 */
            --primary-dark: #218249;
            --secondary-color: #fceea7;
            --bg-color: #f7faf8;
            --text-main: #2c3e35;
            --text-muted: #6e8275;
            --white: #ffffff;
            --border-radius: 12px;
            --shadow-sm: 0 2px 8px rgba(46, 167, 95, 0.08);
            --shadow-md: 0 8px 24px rgba(46, 167, 95, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Navigation */
        header {
            background-color: var(--white);
            box-shadow: var(--shadow-sm);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo span {
            color: #ff9f43; /* 산뜻한 포인트 컬러 */
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        .btn {
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 15px;
        }

        .btn-login {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        .btn-login:hover {
            background-color: rgba(46, 167, 95, 0.1);
        }

        .btn-signup {
            background-color: var(--primary-color);
            color: var(--white);
            box-shadow: 0 4px 10px rgba(46, 167, 95, 0.3);
        }

        .btn-signup:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }

        /* Hero Section */
        .hero {
            padding: 150px 30px 100px;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 50px;
        }

        .hero-text {
            flex: 1;
        }

        .hero-text h1 {
            font-size: 48px;
            line-height: 1.3;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .hero-text h1 span {
            color: var(--primary-color);
        }

        .hero-text p {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .hero-image {
            flex: 1;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border-radius: 40px 10px 40px 10px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: var(--shadow-md);
        }

        .hero-image::after {
            content: '🌱';
            font-size: 100px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        .modal-active {
            display: flex;
        }

        .modal-content {
            background-color: var(--white);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-md);
            position: relative;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            line-height: 1;
        }

        .modal-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .modal-header h2 {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .modal-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(46, 167, 95, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: var(--primary-dark);
        }

        .toggle-modal {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .toggle-modal a {
            color: var(--primary-color);
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .toggle-modal a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-container {
                padding: 15px 20px;
            }
            .logo {
                font-size: 20px;
            }
            .nav-links {
                gap: 12px;
            }
            .nav-links a.hide-mobile {
                display: none;
            }
            .btn {
                padding: 8px 16px;
                font-size: 14px;
            }
            .hero {
                flex-direction: column;
                padding: 120px 20px 60px;
                text-align: center;
                gap: 30px;
            }
            .hero-text h1 {
                font-size: 32px;
                margin-bottom: 15px;
            }
            .hero-text p {
                font-size: 16px;
                margin-bottom: 30px;
            }
            .hero-image {
                height: 250px;
                width: 100%;
                border-radius: 30px 10px 30px 10px;
            }
            .hero-image::after {
                font-size: 70px;
            }
            .modal-content {
                padding: 30px 20px;
                width: 90%;
            }
            .modal-header h2 {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 18px;
            }
            .btn {
                padding: 8px 12px;
                font-size: 13px;
            }
            .nav-links {
                gap: 8px;
            }
            .hero-text h1 {
                font-size: 28px;
                line-height: 1.4;
            }
            .hero-text p {
                font-size: 14px;
            }
            .hero-text .btn-signup {
                font-size: 16px !important;
                padding: 12px 24px !important;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="nav-container">
            <a href="#" class="logo">🌿 잎새<span>교육</span></a>
            <div class="nav-links">
                <a href="#" class="hide-mobile">교육 철학</a>
                <a href="#" class="hide-mobile">수업 안내</a>
                <button class="btn btn-login" onclick="openModal('loginModal')">로그인</button>
                <button class="btn btn-signup" onclick="openModal('signupModal')">회원가입</button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <main class="hero">
        <div class="hero-text">
            <h1>아이들의 무한한 잠재력,<br><span>잎새교육</span>이 함께 키웁니다.</h1>
            <p>튼튼한 기초 위에 피어나는 영어 자신감. 아이의 눈높이에 맞춘 체계적이고 따뜻한 교육으로 미래를 준비하세요.</p>
            <button class="btn btn-signup" style="font-size: 18px; padding: 15px 35px;" onclick="openModal('signupModal')">지금 시작하기</button>
        </div>
        <div class="hero-image">
            <!-- 임의의 이미지를 대체하는 CSS 도형 적용 -->
        </div>
    </main>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('loginModal')">&times;</span>
            <div class="modal-header">
                <h2>로그인</h2>
                <p>잎새교육에 오신 것을 환영합니다.</p>
            </div>
            <form onsubmit="event.preventDefault(); alert('로그인 기능은 나중에 서버와 연결됩니다!');">
                <div class="form-group">
                    <label for="loginId">아이디 (이메일)</label>
                    <input type="email" id="loginId" placeholder="이메일을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="loginPw">비밀번호</label>
                    <input type="password" id="loginPw" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="submit-btn">로그인</button>
            </form>
            <div class="toggle-modal">
                계정이 없으신가요? <a onclick="switchModal('loginModal', 'signupModal')">회원가입하기</a>
            </div>
        </div>
    </div>

    <!-- Signup Modal -->
    <div id="signupModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('signupModal')">&times;</span>
            <div class="modal-header">
                <h2>회원가입</h2>
                <p>잎새교육의 새로운 가족이 되어주세요 🌱</p>
            </div>
            <form onsubmit="event.preventDefault(); alert('회원가입 기능은 나중에 서버와 연결됩니다!'); closeModal('signupModal');">
                <div class="form-group">
                    <label for="signupName">보호자 이름</label>
                    <input type="text" id="signupName" placeholder="홍길동" required>
                </div>
                <div class="form-group">
                    <label for="signupEmail">이메일 주소 (아이디)</label>
                    <input type="email" id="signupEmail" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="signupPw">비밀번호</label>
                    <input type="password" id="signupPw" placeholder="8자리 이상 입력해주세요" required minlength="8">
                </div>
                <div class="form-group">
                    <label for="studentNameInput">학생 이름 (선택)</label>
                    <input type="text" id="studentNameInput" placeholder="자녀의 이름을 입력해주세요">
                </div>
                <button type="submit" class="submit-btn">가입 완료하기</button>
            </form>
            <div class="toggle-modal">
                이미 계정이 있으신가요? <a onclick="switchModal('signupModal', 'loginModal')">로그인하기</a>
            </div>
        </div>
    </div>

    <script>
        // 모달 열기
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('modal-active');
            document.body.style.overflow = 'hidden'; // 뒤 배경 스크롤 방지
        }

        // 모달 닫기
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('modal-active');
            document.body.style.overflow = 'auto'; // 스크롤 복구
        }

        // 모달 전환 (로그인 <-> 회원가입)
        function switchModal(closeId, openId) {
            document.getElementById(closeId).classList.remove('modal-active');
            document.getElementById(openId).classList.add('modal-active');
        }

        // 모달 바깥 영역 클릭시 닫기
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('modal-active');
                document.body.style.overflow = 'auto';
            }
        }
    </script>
</body>
</html>
